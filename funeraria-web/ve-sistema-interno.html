<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <title>Sistema Interno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="login-screen" id="login-screen">
        <div class="login-card">
            <div class="login-logo"><i class="ph ph-shield-check"></i></div>
            <h2>Acceso Restringido</h2>
            <p>Panel de administración</p>
            <form id="login-form" autocomplete="off">
                <div class="input-group"><i class="ph ph-user"></i><input type="text" id="login-user" placeholder="Usuario" required autocomplete="off"></div>
                <div class="input-group"><i class="ph ph-lock"></i><input type="password" id="login-pass" placeholder="Contraseña" required autocomplete="off"></div>
                <p class="login-error" id="login-error"></p>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
        </div>
    </div>
    <div class="admin-dashboard" id="admin-dashboard" style="display:none;">
        <aside class="sidebar">
            <div class="sidebar-header"><i class="ph ph-cross"></i><span>Vida Eterna</span><small>Panel Admin</small></div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-section="dashboard"><i class="ph ph-squares-four"></i> Dashboard</a>
                <a href="#" class="nav-item" data-section="hero"><i class="ph ph-image"></i> Hero / Portada</a>
                <a href="#" class="nav-item" data-section="servicios"><i class="ph ph-list-checks"></i> Servicios</a>
                <a href="#" class="nav-item" data-section="historia"><i class="ph ph-book-open"></i> Nosotros</a>
                <a href="#" class="nav-item" data-section="ubicaciones"><i class="ph ph-map-pin"></i> Ubicaciones</a>
                <a href="#" class="nav-item" data-section="alianzas"><i class="ph ph-handshake"></i> Alianzas</a>
                <a href="#" class="nav-item" data-section="testimonios"><i class="ph ph-chat-teardrop-text"></i> Testimonios</a>
                <a href="#" class="nav-item" data-section="panteon"><i class="ph ph-church"></i> Panteón Jardín</a>
                <a href="#" class="nav-item" data-section="eventos"><i class="ph ph-calendar-plus"></i> Eventos</a>
                <a href="#" class="nav-item" data-section="imagenes"><i class="ph ph-images"></i> Galería Media</a>
                <a href="#" class="nav-item" data-section="ia_images"><i class="ph ph-magic-wand"></i> Nano Banana IA</a>
                <a href="#" class="nav-item" data-section="ia_chat"><i class="ph ph-robot"></i> Asistente Experto</a>
                <a href="#" class="nav-item" data-section="contacto"><i class="ph ph-phone"></i> Contacto</a>
                <a href="#" class="nav-item" data-section="config"><i class="ph ph-gear-six"></i> Configuración</a>
                <a href="#" class="nav-item" data-section="leads"><i class="ph ph-envelope-simple"></i> Leads</a>
                <a href="#" class="nav-item" data-section="chatbot"><i class="ph ph-robot"></i> Chatbot</a>
            </nav>
            <div class="sidebar-footer"><button class="btn-logout" id="btn-logout"><i class="ph ph-sign-out"></i> Cerrar Sesión</button></div>
        </aside>
        <main class="admin-main">
            <header class="admin-header">
                <div><h1 id="page-title">Dashboard</h1><p class="breadcrumb">Panel Administrativo</p></div>
                <div class="header-actions"><a href="index.html" target="_blank" class="btn-preview"><i class="ph ph-eye"></i> Ver Sitio</a></div>
            </header>
            <div class="admin-content" id="admin-content"></div>
        </main>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
